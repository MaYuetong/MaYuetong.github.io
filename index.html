<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yuetong Ma — Spatial Intelligence & AI Systems</title>
<meta name="description" content="Yuetong Ma — Geopolitical Analyst & GIS Researcher. UN Secretariat (UNOCC/DPO), IAEA, Peking University. Spatial intelligence, AI systems, cartography." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root {
  --black: #1a1a1a;
  --secondary: #6a6a6a;
  --secondary2: #a0a0a0;
  --white: #ffffff;
  --surface: #fdf5f7;
  --line: #ede5e8;
  --nadeshiko: #dc9fb4;
  --kohbai: #e16b8c;
  --suoh: #8e354a;
  --taikoh: #f8c3cd;
  --ikkonzome: #f4a7b9;
  --ikkonzome-rgb: 244,167,185;
  --momo: #f596aa;
  --kuwazome: #64363c;
  --kuwazome-mid: #8e3f47;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Instrument Sans', sans-serif;
  background: var(--white);
  color: var(--black);
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }
user-select: none;

/* ── KEYFRAMES ── */
@keyframes mapPulse {
  0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.85; }
  100% { transform: translate(-50%,-50%) scale(3.8); opacity: 0; }
}
@keyframes heroNameReveal {
  0%   { opacity: 0; transform: translateY(40px) scale(0.97); filter: blur(6px); }
  100% { opacity: 1; transform: translateY(0)   scale(1);    filter: blur(0); }
}
@keyframes heroFadeUp {
  0%   { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes scrollBounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(7px); }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes revealUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes lineDraw {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}
@keyframes gradientPan {
  0%,100% { background-position: 0% 50%; }
  50%     { background-position: 100% 50%; }
}

/* ── REVEAL (scroll) ── */
.reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.65s cubic-bezier(0.22,1,0.36,1),
              transform 0.65s cubic-bezier(0.22,1,0.36,1);
}
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-left {
  opacity: 0;
  transform: translateX(-24px);
  transition: opacity 0.6s cubic-bezier(0.22,1,0.36,1),
              transform 0.6s cubic-bezier(0.22,1,0.36,1);
}
.reveal-left.visible { opacity: 1; transform: translateX(0); }

/* ── NAV ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2.5rem;
  background: var(--white);
  border-bottom: 1px solid var(--line);
  transition: background 0.4s ease, border-color 0.4s ease, backdrop-filter 0.4s ease;
}
.nav.nav-glass {
  background: rgba(8, 3, 12, 0.28);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom-color: rgba(255,255,255,0.07);
}
.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem; font-weight: 400; letter-spacing: 0.01em;
  color: var(--black); cursor: pointer;
  transition: color 0.3s;
}
.nav.nav-glass .nav-logo { color: rgba(255,255,255,0.92); }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-link {
  font-size: 0.78rem; font-weight: 500; color: var(--secondary);
  cursor: pointer; transition: color 0.2s;
  padding-bottom: 2px; border-bottom: 1.5px solid transparent;
  letter-spacing: 0.01em;
}
.nav-link:hover { color: var(--black); }
.nav-link.active { color: var(--kohbai); border-bottom-color: var(--kohbai); }
.nav.nav-glass .nav-link { color: rgba(255,255,255,0.52); }
.nav.nav-glass .nav-link:hover { color: rgba(255,255,255,0.88); }
.nav.nav-glass .nav-link.active { color: var(--ikkonzome); border-bottom-color: var(--ikkonzome); }

/* ── HERO (full viewport) ── */
.hero {
  position: relative;
  height: 100vh;
  min-height: 600px;
  overflow: hidden;
}
.hero-map-wrap {
  position: absolute;
  inset: 0; z-index: 0;
}
.hero-map-wrap #places-map {
  width: 100%; height: 100%;
}
.hero-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(
    180deg,
    rgba(6,2,12,0.68) 0%,
    rgba(6,2,12,0.28) 38%,
    rgba(6,2,12,0.22) 62%,
    rgba(6,2,12,0.72) 100%
  );
  pointer-events: none;
}
.hero-content {
  position: absolute; inset: 0; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 7rem 2rem 5rem;
  pointer-events: none;
  will-change: transform, opacity;
}
.hero-eyebrow {
  font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--ikkonzome); font-weight: 600;
  margin-bottom: 1.4rem;
  animation: heroFadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.2s both;
}
.hero-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(4rem, 10vw, 9rem);
  font-weight: 300; letter-spacing: -0.02em;
  color: var(--white); line-height: 0.95;
  margin-bottom: 1.6rem;
  animation: heroNameReveal 1.1s cubic-bezier(0.22,1,0.36,1) 0.4s both;
}
.hero-name em {
  font-style: italic;
  color: var(--ikkonzome);
}
.hero-divider {
  width: 36px; height: 1.5px;
  background: var(--kohbai);
  margin: 0 auto 1.6rem;
  transform-origin: left;
  animation: lineDraw 0.7s cubic-bezier(0.22,1,0.36,1) 1s both;
}
.hero-tagline {
  font-size: clamp(0.85rem, 1.8vw, 1rem);
  color: rgba(255,255,255,0.52);
  max-width: 520px;
  line-height: 1.7;
  margin-bottom: 1rem;
  animation: heroFadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 1.1s both;
}
.hero-cities {
  font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  animation: heroFadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 1.3s both;
}
.hero-scroll {
  position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.32); cursor: pointer; pointer-events: auto;
  animation: heroFadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 1.6s both;
  transition: color 0.2s;
}
.hero-scroll:hover { color: rgba(255,255,255,0.6); }
.hero-scroll-arrow {
  animation: scrollBounce 2s ease-in-out infinite;
  font-size: 1.1rem; line-height: 1;
}

/* ── PLACES SECTION (below hero) ── */
.places-section {
  background: var(--white);
}
.places-header {
  text-align: center;
  padding: 4.5rem 2rem 0;
}
.places-header-eyebrow {
  font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--secondary); font-weight: 600; margin-bottom: 0.6rem;
}
.places-header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 300; color: var(--black); line-height: 1.15;
  margin-bottom: 0.6rem;
}
.places-header-title em { font-style: italic; color: var(--kohbai); }
.places-header-sub {
  font-size: 0.85rem; color: var(--secondary2);
  max-width: 420px; margin: 0 auto;
}

/* ── SECTION HELPERS ── */
.section-wrap { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; }
.section-head { text-align: center; margin-bottom: 2.5rem; }
.section-eyebrow {
  font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--secondary); font-weight: 600; margin-bottom: 0.5rem;
}
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.6rem, 3.5vw, 2.4rem);
  font-weight: 300; color: var(--black); margin-bottom: 0.4rem;
}
.section-sub { font-size: 0.83rem; color: var(--secondary2); }

/* ── FILTER TABS ── */
.filter-tabs {
  display: flex; justify-content: center;
  border-bottom: 1px solid var(--line); margin-bottom: 2.5rem;
}
.filter-tab {
  padding: 0.45rem 1.3rem; font-size: 0.76rem; font-weight: 500;
  color: var(--secondary2); cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.18s; letter-spacing: 0.03em;
}
.filter-tab:hover { color: var(--black); }
.filter-tab.active { color: var(--black); border-bottom-color: var(--black); }

/* ── PLACES GRID ── */
.places-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.4rem;
}
.place-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 10px;
  cursor: pointer; overflow: hidden;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
              box-shadow 0.35s ease;
}
.place-card:hover {
  transform: translateY(-7px);
  box-shadow: 0 18px 42px rgba(100,54,60,0.12),
              0 0 0 1px rgba(225,107,140,0.12);
}
.place-card-img-wrap { position: relative; height: 200px; overflow: hidden; }
.place-type-badge {
  position: absolute; top: 0.7rem; left: 0.7rem; z-index: 3;
  font-size: 0.58rem; letter-spacing: 0.09em; text-transform: uppercase;
  font-weight: 600; padding: 0.2rem 0.6rem; border-radius: 3px;
}
.badge-education { background: var(--taikoh); color: var(--suoh); }
.badge-work { background: var(--kuwazome); color: #fff; }
.place-card-info { padding: 0.9rem 1.1rem 1.1rem; border-top: 1px solid var(--line); }
.place-card-name { font-weight: 600; font-size: 0.95rem; color: var(--black); margin-bottom: 0.2rem; }
.place-card-meta { font-size: 0.76rem; color: var(--secondary); }

/* ── PHOTO UPLOAD ── */
.photo-upload-area {
  width: 100%; height: 100%; position: relative;
  cursor: pointer; display: block; overflow: hidden;
}
.photo-upload-area img { width: 100%; height: 100%; object-fit: cover; }
.photo-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  transition: background 0.18s;
}
.photo-placeholder:hover { filter: brightness(0.96); }
.photo-ph-icon {
  width: 36px; height: 36px; border: 1.5px solid rgba(160,160,160,0.4);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; color: rgba(160,160,160,0.6); line-height: 1;
}
.photo-ph-text {
  font-size: 0.62rem; letter-spacing: 0.09em; text-transform: uppercase;
  color: rgba(160,160,160,0.55); font-weight: 500;
}
.photo-change-hint {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.32);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.18s;
  color: white; font-size: 0.68rem; letter-spacing: 0.09em;
  text-transform: uppercase; font-weight: 500;
}
.photo-upload-area:hover .photo-change-hint { opacity: 1; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem; animation: fadeIn 0.22s ease;
}
.modal-card {
  background: var(--white); max-width: 600px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  border-radius: 14px;
  animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-photo-wrap { position: relative; height: 240px; overflow: hidden; border-radius: 14px 14px 0 0; }
.modal-overlay-text {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 1.2rem 1.6rem;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  pointer-events: none; z-index: 2;
}
.modal-city-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem; font-weight: 400; color: white; line-height: 1.05;
}
.modal-city-sub { font-size: 0.76rem; color: rgba(255,255,255,0.58); margin-top: 0.2rem; }
.modal-close {
  position: absolute; top: 0.8rem; right: 0.8rem; z-index: 4;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
  color: white; width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem; transition: background 0.18s;
}
.modal-close:hover { background: rgba(255,255,255,0.25); }
.modal-body { padding: 1.7rem 1.9rem; }
.modal-label {
  font-size: 0.6rem; letter-spacing: 0.13em; text-transform: uppercase;
  color: var(--kohbai); margin-bottom: 0.55rem; font-weight: 600;
}
.modal-body p { font-size: 0.88rem; color: var(--secondary); line-height: 1.75; margin-bottom: 1.3rem; }

/* ── LEAFLET TOOLTIP ── */
.leaflet-tooltip.rich-tooltip {
  background: rgba(30,8,14,0.97) !important;
  border: 1px solid rgba(225,107,140,0.45) !important;
  border-radius: 8px !important; padding: 0 !important;
  max-width: 290px !important; box-shadow: 0 12px 36px rgba(0,0,0,0.7) !important;
  white-space: normal !important; pointer-events: none !important;
}
.leaflet-tooltip-top.rich-tooltip::before {
  border-top-color: rgba(225,107,140,0.45) !important;
}
.rich-tooltip-inner { padding: 12px 15px 14px; }
.rt-city {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem; font-weight: 500; color: var(--ikkonzome); margin-bottom: 2px;
}
.rt-period {
  font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(255,255,255,0.35); margin-bottom: 7px;
}
.rt-summary { font-size: 0.72rem; line-height: 1.58; color: rgba(255,255,255,0.72); }

/* ── ABOUT PAGE ── */
.about-hero {
  padding: 3.5rem 2rem 2rem;
  text-align: center;
  background: linear-gradient(180deg, var(--surface) 0%, var(--white) 100%);
}
.about-hero-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.5rem, 6vw, 5rem);
  font-weight: 300; color: var(--black); line-height: 1;
  margin-bottom: 0.6rem;
}
.about-hero-title {
  font-size: 0.78rem; color: var(--secondary); letter-spacing: 0.08em;
}
.about-grid {
  display: grid; grid-template-columns: 280px 1fr;
  gap: 4.5rem; align-items: start; margin-bottom: 4rem;
}
.about-portrait-wrap {
  height: 373px; overflow: hidden;
  border-radius: 10px; border: 1px solid var(--line);
}
.about-quote {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 1.22rem; color: var(--black); line-height: 1.65; margin-bottom: 1.1rem;
}
.about-divider { width: 28px; height: 1.5px; background: var(--line); margin: 1.1rem 0; }
.about-text p { font-size: 0.88rem; color: var(--secondary); line-height: 1.8; margin-bottom: 0.9rem; }

/* ── INTERESTS ── */
.interests-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  border: 1px solid var(--line); border-radius: 10px;
  margin-top: 0.5rem; overflow: hidden;
}
.interest-card {
  padding: 1.4rem 1.2rem;
  border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
  transition: background 0.2s;
}
.interest-card:hover { background: var(--surface); }
.interest-card:nth-child(3n) { border-right: none; }
.interest-card:nth-last-child(-n+3) { border-bottom: none; }
.interest-icon { font-size: 1.25rem; margin-bottom: 0.45rem; }
.interest-title { font-weight: 600; font-size: 0.86rem; color: var(--black); margin-bottom: 0.25rem; }
.interest-desc { font-size: 0.76rem; color: var(--secondary); line-height: 1.52; }

/* ── CURIOSITIES ── */
.curiosities-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 2.5rem; }
.curiosity-item {
  display: flex; gap: 0.6rem; font-size: 0.85rem; color: var(--secondary);
  padding: 0.65rem 0; border-bottom: 1px solid var(--line); align-items: flex-start;
  transition: color 0.18s;
}
.curiosity-item:hover { color: var(--black); }
.curiosity-arrow { color: var(--secondary2); flex-shrink: 0; font-weight: 400; }

/* ── EXPERIENCE PAGE ── */
.experience-hero {
  padding: 5rem 2rem 2.5rem;
  background: linear-gradient(180deg, var(--surface) 60%, var(--white) 100%);
  text-align: center;
}
.experience-hero-eyebrow {
  font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--secondary); font-weight: 600; margin-bottom: 0.7rem;
}
.experience-hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.6rem, 3.5vw, 2.4rem);
  font-weight: 300; color: var(--black); line-height: 1.08; margin-bottom: 0.4rem;
}
.experience-hero-title em { font-style: italic; color: var(--kohbai); }
.experience-wrap { max-width: 900px; margin: 0 auto; padding: 4rem 2rem; }
.timeline { position: relative; }
.timeline::before {
  content: ''; position: absolute; left: 128px; top: 0; bottom: 0;
  width: 1px; background: var(--line);
}
.timeline-item {
  display: grid; grid-template-columns: 140px 1fr;
  gap: 0 3.5rem; padding-bottom: 2.8rem; position: relative;
}
.timeline-year {
  text-align: left; padding-top: 0.15rem; padding-left: 0.1rem;
  font-size: 0.7rem; font-weight: 600; color: var(--secondary2); letter-spacing: 0.02em;
}
.timeline-dot {
  position: absolute; left: 148px; top: 0.35rem;
  width: 8px; height: 8px; border-radius: 50%; background: var(--secondary2);
  box-shadow: 0 0 0 3px rgba(160,160,160,0.15);
  transition: box-shadow 0.3s;
}
.timeline-item:hover .timeline-dot {
  box-shadow: 0 0 0 6px rgba(225,107,140,0.14);
}
.timeline-content { padding-left: 0.5rem; }
.timeline-logo-wrap {
  display: flex; align-items: center; margin-bottom: 0.65rem;
  height: 34px;
}
.timeline-logo {
  max-height: 30px; max-width: 90px;
  object-fit: contain; object-position: left center;
  filter: grayscale(10%); opacity: 0.85;
  transition: opacity 0.2s, filter 0.2s;
}
.timeline-logo.logo-dji { filter: none; opacity: 0.85; }
.timeline-item:hover .timeline-logo { opacity: 1; filter: grayscale(0%); }
.timeline-item:hover .timeline-logo.logo-dji { opacity: 1; }
.timeline-logo-initials {
  display: inline-flex; align-items: center; justify-content: center;
  height: 28px; padding: 0 10px; border-radius: 5px;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
  color: #fff; opacity: 0.82; transition: opacity 0.2s;
}
.timeline-item:hover .timeline-logo-initials { opacity: 1; }
.timeline-org {
  font-size: 0.6rem; letter-spacing: 0.11em; text-transform: uppercase;
  color: var(--secondary2); margin-bottom: 0.22rem; font-weight: 600;
}
.timeline-role {
  font-weight: 600; font-size: 0.97rem; color: var(--black);
  margin-bottom: 0.22rem; line-height: 1.3;
}
.timeline-location { font-size: 0.74rem; color: var(--secondary); margin-bottom: 0.55rem; }
.timeline-desc { font-size: 0.84rem; color: var(--secondary); line-height: 1.72; margin-bottom: 0.8rem; }
.timeline-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
.timeline-tag {
  font-size: 0.66rem; padding: 0.14rem 0.55rem;
  border: 1px solid var(--line); color: var(--secondary);
  border-radius: 3px; font-weight: 500;
  transition: border-color 0.18s, color 0.18s;
}
.timeline-tag:hover { border-color: var(--secondary2); color: var(--black); }

/* ── PROJECTS PAGE ── */
.projects-hero {
  padding: 5rem 2rem 2.5rem; text-align: center;
  background: linear-gradient(180deg, var(--surface) 60%, var(--white) 100%);
}
.projects-grid {

function useScrollReveal(dep) {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal, .reveal-left');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1, rootMargin: '0px 0px -36px 0px' });
    els.forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, [dep]);
}

function createArc(from, to, numPoints = 60) {
  const pts = [];
  let lngDiff = to[1] - from[1];
  if (lngDiff > 180) lngDiff -= 360;
  if (lngDiff < -180) lngDiff += 360;
  for (let i = 0; i <= numPoints; i++) {
    const t = i / numPoints;
    pts.push([from[0] + (to[0]-from[0])*t + Math.sin(Math.PI*t)*10, from[1]+lngDiff*t]);
  }
  return pts;
}

/* ── PhotoUpload ── */
function PhotoUpload({ storageKey, height, placeholderText = 'Add Photo', style = {}, defaultSrc = null }) {
  const [src, setSrc] = useState(() => {
    try { return localStorage.getItem('img_' + storageKey) || defaultSrc; } catch { return defaultSrc; }
  });
  const inputRef = useRef(null);
  const handleChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      setSrc(ev.target.result);
      try { localStorage.setItem('img_' + storageKey, ev.target.result); } catch {}
    };
    reader.readAsDataURL(file);
  };
  return (
    <div style={{ width:'100%', height: height||'100%', ...style, position:'relative', cursor:'pointer', overflow:'hidden', display:'block' }}
         onClick={() => inputRef.current?.click()}>
      {src ? (
        <>
          <img src={src} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
          <div className="photo-change-hint">Change Photo</div>
        </>
      ) : (
        <div className="photo-placeholder" style={{ background: style.background || 'var(--surface)' }}>
          <div className="photo-ph-icon">+</div>
          <div className="photo-ph-text">{placeholderText}</div>
        </div>
      )}
      <input ref={inputRef} type="file" accept="image/*" onChange={handleChange} style={{ display:'none' }} />
    </div>
  );
}

/* ── LeafletMap ── */
function LeafletMap({ onMarkerClick, compact }) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);

  useEffect(() => {
    if (mapInstanceRef.current || !mapRef.current) return;

    const map = L.map(mapRef.current, {
      center: [32, 20], zoom: compact ? 1.5 : 2,
      scrollWheelZoom: false, zoomControl: false,
    });
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO',
      subdomains: 'abcd', maxZoom: 20,
    }).addTo(map);

    const byId = {};
    places.forEach(p => { byId[p.id] = p; });

    arcConnections.forEach(([a,b]) => {
      const pA = byId[a], pB = byId[b];
      if (!pA || !pB) return;
      L.polyline(createArc(pA.coordinates, pB.coordinates), {
        color: 'rgba(244,167,185,0.35)', weight: 1.2,
        dashArray: '5 8', interactive: false,
      }).addTo(map);
    });

    places.forEach(place => {
      const isWork = place.type === 'work';
      const color = isWork ? '#E16B8C' : '#DC9FB4';
      const icon = L.divIcon({
        className: '',
        html: `<div style="position:relative;width:28px;height:28px">
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;background:${color};border-radius:50%;box-shadow:0 0 10px ${color},0 0 22px rgba(225,107,140,0.35)"></div>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(225,107,140,0.35);animation:mapPulse 2.8s ease-out infinite"></div>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;border:1px solid rgba(225,107,140,0.2);animation:mapPulse 2.8s ease-out 0.9s infinite"></div>
        </div>`,
        iconSize: [28, 28], iconAnchor: [14, 14],
      });
      const tooltipHtml = `<div class="rich-tooltip-inner">
        <div class="rt-city">${place.name}</div>
        <div class="rt-period">${place.years} · ${place.country}</div>
        <div class="rt-summary">${place.tooltipSummary}</div>
      </div>`;
      const marker = L.marker(place.coordinates, { icon }).addTo(map);
      marker.bindTooltip(tooltipHtml, { className:'rich-tooltip', permanent:false, direction:'top', offset:[0,-18], opacity:1 });
      marker.on('click', () => onMarkerClick(place));
    });

    mapInstanceRef.current = map;
    return () => {
      if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; }
    };
  }, []);

  return <div ref={mapRef} id="places-map" style={{ width:'100%', height:'100%' }} />;
}

}

/* ── ContactPage ── */
function ContactPage({ lang = 'en' }) {
  const [status, setStatus] = useState('idle');
  const [form, setForm] = useState({ name:'', email:'', message:'' });
  const c = T[lang].contact;
  const handleChange = (e) => setForm(prev => ({ ...prev, [e.target.name]: e.target.value }));
  const handleSubmit = async (e) => {
    e.preventDefault(); setStatus('sending');
    try {
      const res = await fetch('https://formspree.io/f/xdapgbkw', {
        method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'},
        body: JSON.stringify(form),
      });
      if (res.ok) { setStatus('success'); setForm({ name:'', email:'', message:'' }); }
      else setStatus('error');
    } catch { setStatus('error'); }
  };
  return (
    <div className="contact-page" style={{ paddingTop: '60px' }}>
      <div className="contact-main">
        <div className="contact-eyebrow">{c.eyebrow}</div>
        <h2 className="contact-h2">{c.h2}</h2>
        <p className="contact-p">{c.p}</p>
        {status === 'success' ? (
          <div className="contact-success">
            <div className="contact-success-icon">✓</div>
            <div>{c.success}</div>
            <div style={{ fontSize:'0.8rem', color:'rgba(255,255,255,0.38)', marginTop:'0.4rem' }}>{c.successSub}</div>
            <button onClick={() => setStatus('idle')} style={{ marginTop:'1.5rem', background:'none', border:'1px solid rgba(255,255,255,0.14)', color:'rgba(255,255,255,0.45)', padding:'0.5rem 1.3rem', borderRadius:'5px', cursor:'pointer', fontFamily:'inherit', fontSize:'0.76rem', letterSpacing:'0.06em' }}>
              {c.sendAnother}
            </button>
          </div>
        ) : (
          <form className="contact-form" onSubmit={handleSubmit}>
            <div className="contact-form-row">
              <div className="contact-field">
                <label className="contact-label">{c.labelName}</label>
                <input className="contact-input" type="text" name="name" required placeholder={c.phName} value={form.name} onChange={handleChange} />
              </div>
              <div className="contact-field">
                <label className="contact-label">{c.labelEmail}</label>
                <input className="contact-input" type="email" name="email" required placeholder={c.phEmail} value={form.email} onChange={handleChange} />
              </div>
            </div>
            <div className="contact-field">
              <label className="contact-label">{c.labelMsg}</label>
              <textarea className="contact-textarea" name="message" required placeholder={c.phMsg} value={form.message} onChange={handleChange} />
            </div>
            {status === 'error' && <div style={{ fontSize:'0.8rem', color:'#DB4444' }}>{c.error}</div>}
            <button className="contact-submit" type="submit" disabled={status === 'sending'}>
              {status === 'sending' ? c.sending : c.send}
            </button>
          </form>
        )}
        <div className="contact-secondary-links">
          <a href="https://www.linkedin.com/in/yuetong-ma-a2258324b/" target="_blank" rel="noopener" className="contact-secondary-link">LinkedIn ↗</a>
          <a href="https://arcg.is/j9qHv" target="_blank" rel="noopener" className="contact-secondary-link">Spatial Portfolio ↗</a>
        </div>
        <div className="contact-langs">Chinese (Native) · English (Professional) · German (Basic)</div>
      </div>
      <div className="contact-footer">
        <span>Yuetong Ma — GIS Researcher &amp; Geopolitical Analyst</span>
        <span>New York · Vienna · Shenzhen · 2026</span>
      </div>
    </div>
  );
}

const navPages = [
  { id:'places', label:'Places' },
  { id:'about', label:'About' },
  { id:'experience', label:'Experience' },
  { id:'projects', label:'Projects' },
  { id:'other', label:'Other' },
  { id:'contact', label:'Contact' },
];

function App() {
  const [page, setPage] = useState('places');
  const [navGlass, setNavGlass] = useState(true);
  const [lang, setLang] = useState('en');
  const [showBanner, setShowBanner] = useState(() => detectLang() === 'zh');
  const [menuOpen, setMenuOpen] = useState(false);

  useEffect(() => {
    const handleScroll = () => {
      if (page === 'places') {
        setNavGlass(window.scrollY < window.innerHeight * 0.65);
      }
    };
    window.addEventListener('scroll', handleScroll, { passive: true });
    return () => window.removeEventListener('scroll', handleScroll);
  }, [page]);

  useEffect(() => {
    setNavGlass(page === 'places');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setMenuOpen(false);
  }, [page]);

  const toggleLang = () => { setLang(l => l === 'en' ? 'zh' : 'en'); setShowBanner(false); setMenuOpen(false); };
  const goTo = (id) => { setPage(id); setMenuOpen(false); };

  const renderPage = () => {
    switch (page) {
      case 'places':     return <PlacesPage setPage={setPage} lang={lang} />;
      case 'about':      return <AboutPage lang={lang} />;
      case 'experience': return <ExperiencePage lang={lang} />;
      case 'projects':   return <ProjectsPage lang={lang} />;
      case 'other':      return <OtherPage lang={lang} />;
      case 'contact':    return <ContactPage lang={lang} />;
      default:           return <PlacesPage setPage={setPage} lang={lang} />;
    }
  };

  return (
    <>
      <nav className={'nav' + (navGlass ? ' nav-glass' : '')}>
        <div className="nav-logo" onClick={() => goTo('places')}>Yuetong Ma</div>
        <ul className="nav-links">
          {navPages.map(p => (
            <li key={p.id} className={'nav-link' + (page === p.id ? ' active' : '')} onClick={() => setPage(p.id)}>
              {T[lang].nav[p.id]}
            </li>
          ))}
        </ul>
        <button className="lang-toggle" onClick={toggleLang}>{T[lang].langToggle}</button>
        <button className="hamburger" onClick={() => setMenuOpen(o => !o)} aria-label="Menu">
          <span /><span /><span />
        </button>
      </nav>
      <div className={'mobile-menu' + (menuOpen ? ' open' : '')}>
        {navPages.map(p => (
          <div key={p.id} className="mobile-menu-link" onClick={() => goTo(p.id)}>{T[lang].nav[p.id]}</div>
        ))}
        <div className="mobile-menu-lang">
          <span>{lang === 'zh' ? '语言' : 'Language'}</span>
          <button className="mobile-lang-btn" onClick={toggleLang}>{T[lang].langToggle}</button>
        </div>
      </div>
      {renderPage()}
      {showBanner && <LangBanner lang={lang} onSwitch={() => { setLang('zh'); setShowBanner(false); }} onDismiss={() => setShowBanner(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
